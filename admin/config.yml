backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - label: "Homepage"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Hero Eyebrow", name: "heroEyebrow", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Text", name: "heroText", widget: "text" }
          - { label: "Hero Image", name: "heroImage", widget: "image" }

          - { label: "Primary Button Text", name: "primaryButtonText", widget: "string" }
          - { label: "Primary Button URL", name: "primaryButtonUrl", widget: "string" }
          - { label: "Secondary Button Text", name: "secondaryButtonText", widget: "string" }
          - { label: "Secondary Button URL", name: "secondaryButtonUrl", widget: "string" }

          - { label: "Intro Kicker", name: "introKicker", widget: "string" }
          - { label: "Intro Title", name: "introTitle", widget: "string" }
          - { label: "Intro Text", name: "introText", widget: "text" }
